<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Ashton Jigsaws Follow Goal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="goal-container">
  <div id="title">FOLLOW GOAL: 100</div>

  <div id="bar-frame">
    <div id="bar-fill"></div>
  </div>

  <div id="count-text"></div>
</div>

<script>
async function loadFollowers() {
  const response = await fetch("followers.json?cachebust=" + Date.now());
  const data = await response.json();

  const current = data.followers;
  const goal = 100;
  const remaining = goal - current;

  const percent = Math.min((current / goal) * 100, 100);

  document.getElementById("bar-fill").style.width = percent + "%";
  document.getElementById("count-text").innerText =
    `${current} / ${goal} — ${remaining > 0 ? remaining + " to go!" : "Goal reached!"}`;
}

loadFollowers();
setInterval(loadFollowers, 15000);
</script>

</body>
</html>
